name: Test, build, and deploy frontend

on:
  push:
    branches: [main, master]

permissions:
  contents: read

env:
  # Must match Terraform variable ssm_prefix (default /signal-front/)
  SIGNAL_FRONT_SSM_PREFIX: /signal-front/
  # Set GitHub secret AWS_REGION to the same value as Terraform aws_region (e.g. us-east-2).

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with VITE_API_BASE_URL from SSM
        run: |
          set -euo pipefail
          PARAM="${SIGNAL_FRONT_SSM_PREFIX}VITE_API_BASE_URL"
          VITE_API_BASE_URL=$(aws ssm get-parameter --name "$PARAM" --query Parameter.Value --output text)
          export VITE_API_BASE_URL
          npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  deploy:
    name: Deploy to S3 and invalidate CloudFront
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Sync to S3 and invalidate CloudFront
        run: |
          set -euo pipefail
          PREFIX="${SIGNAL_FRONT_SSM_PREFIX}"
          BUCKET=$(aws ssm get-parameter --name "${PREFIX}S3_BUCKET_NAME" --query Parameter.Value --output text)
          DIST_ID=$(aws ssm get-parameter --name "${PREFIX}CLOUDFRONT_DISTRIBUTION_ID" --query Parameter.Value --output text)
          aws s3 sync dist/ "s3://$BUCKET" --delete
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
